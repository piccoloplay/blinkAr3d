<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>La Doppia Fenditura — Quantum AR</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">QUANTUM AR</a>
      <a href="../index.html" class="nav-back">← Livelli</a>
    </div>
  </nav>

  <!-- Page -->
  <main class="page">

    <!-- Progress steps -->
    <div class="steps">
      <div class="step active" id="step-intro">
        <div class="step-dot">1</div>
        <div class="step-label">Teoria</div>
      </div>
      <div class="step" id="step-quiz">
        <div class="step-dot">2</div>
        <div class="step-label">Quiz</div>
      </div>
      <div class="step" id="step-ar">
        <div class="step-dot">3</div>
        <div class="step-label">AR</div>
      </div>
    </div>

    <!-- SECTION 1: Intro -->
    <section id="intro-section">
      <span class="section-label" id="level-label"></span>
      <h1 class="page-title" id="level-title"></h1>
      <p class="page-subtitle" id="level-subtitle"></p>

      <div id="intro-cards"></div>

      <div style="text-align:center; margin-top:2rem;">
        <button class="btn btn-primary" id="goto-quiz">Vai al Quiz →</button>
      </div>
    </section>

    <!-- SECTION 2: Quiz -->
    <section class="quiz-section" id="quiz-section" style="display:none;">
      <h2 class="page-title" style="font-size:2rem; margin-bottom:0.5rem;">Verifica</h2>
      <p class="page-subtitle">Rispondi vero o falso per sbloccare l'esperienza AR</p>
      <div id="quiz-container"></div>
    </section>

    <!-- SECTION 3: AR -->
    <section class="ar-section" id="ar-section">
      <h2 class="page-title" style="font-size:2rem; margin-bottom:0.5rem;">Esperienza AR</h2>
      <p class="page-subtitle" id="ar-description"></p>

      <!-- AR viewport -->
      <div class="ar-container" id="ar-viewport">
        <video class="ar-video" id="ar-video" autoplay playsinline muted></video>
        <canvas class="ar-canvas" id="ar-canvas"></canvas>
        <div class="ar-hud">
          <div class="ar-hud-dot"></div>
          <span>AR Live</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="ar-controls" id="ar-controls"></div>

      <!-- Info panel -->
      <div class="ar-info" id="ar-info">
        <strong style="color:var(--neon-cyan);">💡 Cosa osservi?</strong><br>
        <span id="ar-feedback">Spara particelle e osserva il pattern sullo schermo. Prova ad attivare il rivelatore!</span>
      </div>

      <div style="text-align:center; margin-top:1.5rem; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-ghost" id="ar-clear-btn">🗑 Pulisci schermo</button>
        <button class="btn btn-ghost" id="ar-fullscreen-btn">⛶ Schermo intero</button>
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/quiz.js"></script>
  <script src="../js/ar-engine.js"></script>
  <script src="../js/slit-level.js"></script>

  <script>
    // ── Boot double-slit level ──
    (async function () {
      const data = await App.loadJSON('../data/doppia-fenditura.json');
      if (!data) return;

      // ── Populate intro ──
      document.getElementById('level-label').textContent = `${data.icon} ${data.id.toUpperCase()}`;
      document.getElementById('level-title').textContent = data.title;
      document.getElementById('level-subtitle').textContent = data.subtitle;

      const introCards = document.getElementById('intro-cards');
      data.intro.sections.forEach((s, i) => {
        introCards.innerHTML += `
          <div class="card fade-in-up stagger-${Math.min(i + 1, 4)}">
            <h3 class="card-heading">${s.heading}</h3>
            <p class="card-text">${s.text}</p>
          </div>
        `;
      });

      // ── Navigation ──
      const introSection = document.getElementById('intro-section');
      const quizSection = document.getElementById('quiz-section');
      const arSection = document.getElementById('ar-section');

      function setStep(step) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active', 'done'));
        if (step >= 1) document.getElementById('step-intro').classList.add('done');
        if (step >= 2) document.getElementById('step-quiz').classList.add('done');
        if (step === 0) document.getElementById('step-intro').classList.add('active');
        if (step === 1) document.getElementById('step-quiz').classList.add('active');
        if (step === 2) document.getElementById('step-ar').classList.add('active');
      }

      document.getElementById('goto-quiz').addEventListener('click', () => {
        introSection.style.display = 'none';
        quizSection.style.display = 'block';
        setStep(1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // ── Quiz ──
      const quiz = new Quiz({
        data: data.quiz,
        container: '#quiz-container',
        onPass: () => {
          setStep(2);
          arSection.classList.add('visible');
          setTimeout(() => {
            arSection.scrollIntoView({ behavior: 'smooth' });
          }, 300);
          startAR();
        }
      });
      quiz.render();

      // ── AR description ──
      document.getElementById('ar-description').textContent = data.ar.description;

      // ── Build AR controls ──
      const controlsEl = document.getElementById('ar-controls');

      data.ar.controls.forEach(ctrl => {
        const group = document.createElement('div');
        group.className = 'ar-control-group';

        if (ctrl.type === 'toggle') {
          group.innerHTML = `
            <div class="ar-control-label">
              <span>${ctrl.label}</span>
              <span class="ar-control-value" id="val-${ctrl.id}" style="color:var(--neon-red);">OFF</span>
            </div>
            <button class="ar-toggle" id="ctrl-${ctrl.id}"></button>
          `;
        } else {
          group.innerHTML = `
            <div class="ar-control-label">
              <span>${ctrl.label}</span>
              <span class="ar-control-value" id="val-${ctrl.id}">${ctrl.default}</span>
            </div>
            <input type="range" class="ar-slider" id="ctrl-${ctrl.id}"
                   min="${ctrl.min}" max="${ctrl.max}" step="${ctrl.step}" value="${ctrl.default}">
          `;
        }

        controlsEl.appendChild(group);
      });

      // ── Start AR ──
      let engine = null;
      let level = null;

      async function startAR() {
        engine = new AREngine({
          canvasSelector: '#ar-canvas',
          videoSelector: '#ar-video'
        });
        engine.initScene();
        await engine.startCamera();

        level = new SlitLevel(engine, data.ar);
        engine.start();

        // Bind fire rate slider
        const fireSlider = document.getElementById('ctrl-fire_rate');
        if (fireSlider) {
          fireSlider.addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            level.setFireRate(v);
            document.getElementById('val-fire_rate').textContent = v;
          });
        }

        // Bind detector toggle
        const detectorBtn = document.getElementById('ctrl-detector');
        if (detectorBtn) {
          detectorBtn.addEventListener('click', () => {
            const isActive = detectorBtn.classList.toggle('active');
            level.setDetector(isActive);
            const valEl = document.getElementById('val-detector');
            valEl.textContent = isActive ? 'ON' : 'OFF';
            valEl.style.color = isActive ? 'var(--neon-green)' : 'var(--neon-red)';
            updateFeedback(isActive);
          });
        }

        // Clear screen button
        document.getElementById('ar-clear-btn')?.addEventListener('click', () => {
          if (level) level.clearScreen();
        });
      }

      function updateFeedback(detectorOn) {
        const fb = document.getElementById('ar-feedback');
        if (detectorOn) {
          fb.innerHTML = `<span style="color:var(--neon-red);">Rivelatore ATTIVO.</span> Stai osservando da quale fenditura passa ogni particella. Il pattern di interferenza scompare — le particelle si comportano come "palline classiche".`;
        } else {
          fb.innerHTML = `<span style="color:var(--neon-green);">Rivelatore SPENTO.</span> Senza osservazione, le particelle passano da "entrambe le fenditure" simultaneamente e interferiscono con se stesse, creando frange di interferenza.`;
        }
      }

      // ── Fullscreen ──
      document.getElementById('ar-fullscreen-btn')?.addEventListener('click', () => {
        const viewport = document.getElementById('ar-viewport');
        if (viewport.requestFullscreen) {
          viewport.requestFullscreen();
        } else if (viewport.webkitRequestFullscreen) {
          viewport.webkitRequestFullscreen();
        }
      });

    })();
  </script>
</body>
</html>
