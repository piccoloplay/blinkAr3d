<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Experience — Quantum AR</title>
  <link rel="stylesheet" href="../css/style.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    /* AR page: no scroll, fullscreen */
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; }
    body::before { display: none; } /* no grid on AR page */
  </style>
</head>
<body>

  <!-- Fullscreen AR -->
  <div class="ar-fullscreen" style="display:block;">

    <!-- MindAR container -->
    <div id="ar-container"></div>

    <!-- Close button -->
    <button class="ar-close" id="ar-close">✕</button>

    <!-- HUD -->
    <div class="ar-hud">
      <div class="ar-hud-dot"></div>
      <span>AR Live</span>
    </div>

    <!-- Tracking status -->
    <div class="ar-tracking-banner" id="tracking-banner">
      🔍 Inquadra l'immagine marker…
    </div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" id="bottom-sheet">
      <div class="bottom-sheet-handle" id="sheet-handle">
        <div class="bottom-sheet-bar"></div>
        <div class="bottom-sheet-peek">Controlli</div>
      </div>
      <div class="bottom-sheet-content" id="sheet-content">
        <!-- Controls populated by JS -->
        <div id="ar-controls"></div>
        <!-- Feedback -->
        <div class="ar-feedback" id="ar-feedback">
          Regola i parametri per interagire con la simulazione.
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Bottom sheet drag logic ──
    (function () {
      const sheet = document.getElementById('bottom-sheet');
      const handle = document.getElementById('sheet-handle');
      let startY = 0, dragging = false;

      // Toggle on tap
      handle.addEventListener('click', () => {
        sheet.classList.toggle('expanded');
      });

      // Drag
      handle.addEventListener('touchstart', (e) => {
        dragging = true;
        startY = e.touches[0].clientY;
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > 40) {
          sheet.classList.remove('expanded');
          dragging = false;
        } else if (dy < -40) {
          sheet.classList.add('expanded');
          dragging = false;
        }
      }, { passive: true });

      document.addEventListener('touchend', () => { dragging = false; });
    })();

    // ── Close button ──
    document.getElementById('ar-close').addEventListener('click', () => {
      window.history.back();
    });
  </script>

  <!-- AR module -->
  <script type="module">
    import { AREngine } from '../js/ar-engine.js';

    (async function () {
      // Read level from URL
      const params = new URLSearchParams(window.location.search);
      const level = params.get('level');

      if (!level) {
        document.getElementById('tracking-banner').textContent = '❌ Nessun livello specificato';
        return;
      }

      // Load level data
      let data;
      try {
        const res = await fetch(`../data/${level}.json`);
        data = await res.json();
      } catch (e) {
        document.getElementById('tracking-banner').textContent = '❌ Errore caricamento dati';
        return;
      }

      // Build controls in bottom sheet
      const controlsEl = document.getElementById('ar-controls');

      data.ar.controls.forEach(ctrl => {
        const group = document.createElement('div');
        group.className = 'ar-control-group';

        if (ctrl.type === 'toggle') {
          group.innerHTML = `
            <div class="ar-control-label">
              <span>${ctrl.label}</span>
              <span class="ar-control-value" id="val-${ctrl.id}" style="color:var(--neon-red);">OFF</span>
            </div>
            <button class="ar-toggle" id="ctrl-${ctrl.id}"></button>
          `;
        } else {
          group.innerHTML = `
            <div class="ar-control-label">
              <span>${ctrl.label}</span>
              <span class="ar-control-value" id="val-${ctrl.id}">${ctrl.default}</span>
            </div>
            <input type="range" class="ar-slider" id="ctrl-${ctrl.id}"
                   min="${ctrl.min}" max="${ctrl.max}" step="${ctrl.step}" value="${ctrl.default}">
          `;
        }
        controlsEl.appendChild(group);
      });

      // Add clear button for slit level
      if (level === 'doppia-fenditura') {
        const clearBtn = document.createElement('button');
        clearBtn.className = 'btn btn-ghost';
        clearBtn.style.cssText = 'width:100%; margin-top:8px;';
        clearBtn.textContent = '🗑 Pulisci schermo';
        clearBtn.id = 'ar-clear-btn';
        controlsEl.appendChild(clearBtn);
      }

      // Init AR engine
      const engine = new AREngine({
        container: '#ar-container',
        targetSrc: '../assets/targets.mind'
      });
      engine.init();

      // Tracking events
      const banner = document.getElementById('tracking-banner');
      document.getElementById('ar-container').addEventListener('target-found', () => {
        banner.innerHTML = '<span style="color:var(--neon-green);">✓ Marker rilevato</span>';
        setTimeout(() => { banner.style.opacity = '0'; }, 2000);
      });
      document.getElementById('ar-container').addEventListener('target-lost', () => {
        banner.style.opacity = '1';
        banner.innerHTML = '<span style="color:var(--neon-red);">Inquadra di nuovo il marker</span>';
      });

      // Dynamic import of the correct level module
      let levelInstance;

      if (level === 'laser') {
        const { LaserLevel } = await import('../js/laser-level.js');
        levelInstance = new LaserLevel(engine, data.ar);
        document.getElementById('ctrl-frequency')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setFrequency(v);
          document.getElementById('val-frequency').textContent = v;
          updateLaserFeedback(v, data.ar.threshold_frequency);
        });
        document.getElementById('ctrl-intensity')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setIntensity(v);
          document.getElementById('val-intensity').textContent = v;
        });
        document.getElementById('ar-feedback').innerHTML = data.ar.description;

      } else if (level === 'doppia-fenditura') {
        const { SlitLevel } = await import('../js/slit-level.js');
        levelInstance = new SlitLevel(engine, data.ar);
        document.getElementById('ctrl-fire_rate')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setFireRate(v);
          document.getElementById('val-fire_rate').textContent = v;
        });
        document.getElementById('ctrl-detector')?.addEventListener('click', function () {
          const active = this.classList.toggle('active');
          levelInstance.setDetector(active);
          const valEl = document.getElementById('val-detector');
          valEl.textContent = active ? 'ON' : 'OFF';
          valEl.style.color = active ? 'var(--neon-green)' : 'var(--neon-red)';
          updateSlitFeedback(active);
        });
        document.getElementById('ar-clear-btn')?.addEventListener('click', () => levelInstance?.clearScreen());
        document.getElementById('ar-feedback').innerHTML = data.ar.description;

      } else if (level === 'entanglement') {
        const { EntanglementLevel } = await import('../js/entanglement-level.js');
        levelInstance = new EntanglementLevel(engine, data.ar);
        document.getElementById('ctrl-distance')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setDistance(v);
          document.getElementById('val-distance').textContent = v;
        });
        document.getElementById('ctrl-measure_angle')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setMeasureAngle(v);
          document.getElementById('val-measure_angle').textContent = v + '°';
        });
        const measureBtn = document.createElement('button');
        measureBtn.className = 'btn btn-primary';
        measureBtn.style.cssText = 'width:100%; margin-top:8px;';
        measureBtn.textContent = '⚛ Misura Spin';
        controlsEl.appendChild(measureBtn);
        measureBtn.addEventListener('click', () => {
          const r = levelInstance.measure();
          document.getElementById('ar-feedback').innerHTML = `
            A: <strong style="color:var(--neon-cyan);">${r.spinA}</strong>
            B: <strong style="color:#9d00ff;">${r.spinB}</strong>
            ${r.correlated ? '<span style="color:var(--neon-green);">✓ Correlate</span>' : '<span style="color:var(--neon-red);">✗ Non correlate</span>'}
            — ${r.total} misure | ${(r.correlationRate*100).toFixed(0)}% correlazione`;
          setTimeout(() => levelInstance.reset(), 1500);
        });
        document.getElementById('ar-feedback').innerHTML = data.ar.description;

      } else if (level === 'tunnel') {
        const { TunnelLevel } = await import('../js/tunnel-level.js');
        levelInstance = new TunnelLevel(engine, data.ar);
        document.getElementById('ctrl-energy')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setEnergy(v);
          document.getElementById('val-energy').textContent = v;
          showTunnelStats();
        });
        document.getElementById('ctrl-barrier_width')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setBarrierWidth(v);
          document.getElementById('val-barrier_width').textContent = v;
          showTunnelStats();
        });
        document.getElementById('ctrl-barrier_height')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          levelInstance.setBarrierHeight(v);
          document.getElementById('val-barrier_height').textContent = v;
          showTunnelStats();
        });
        const launchBtn = document.createElement('button');
        launchBtn.className = 'btn btn-primary';
        launchBtn.style.cssText = 'width:100%; margin-top:8px;';
        launchBtn.textContent = '🚀 Lancia Particella';
        controlsEl.appendChild(launchBtn);
        launchBtn.addEventListener('click', () => { levelInstance.launch(); showTunnelStats(); });
        function showTunnelStats() {
          const s = levelInstance.getStats();
          document.getElementById('ar-feedback').innerHTML = `
            Probabilità: <strong style="color:var(--neon-cyan);">${(s.probability*100).toFixed(1)}%</strong>
            — Passate: <strong style="color:var(--neon-green);">${s.tunneled}</strong>/${s.launched}`;
        }
        document.getElementById('ar-feedback').innerHTML = data.ar.description;

      } else if (level === 'heisenberg') {
        const { HeisenbergLevel } = await import('../js/heisenberg-level.js');
        levelInstance = new HeisenbergLevel(engine, data.ar);
        document.getElementById('ctrl-delta_x')?.addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          const dp = levelInstance.setDeltaX(v);
          document.getElementById('val-delta_x').textContent = v.toFixed(2);
          document.getElementById('ar-feedback').innerHTML = `
            Δx = <span style="color:var(--neon-cyan);">${v.toFixed(2)}</span>
            Δp = <span style="color:var(--neon-red);">${dp.toFixed(2)}</span><br>
            ${v < 0.5 ? '⚠ Posizione precisa → momento impazzito!' : v > 1.5 ? '⚠ Momento preciso → posizione sfuocata!' : '⚖ Equilibrio tra incertezze'}`;
        });
        const measureBtn = document.createElement('button');
        measureBtn.className = 'btn btn-primary';
        measureBtn.style.cssText = 'width:100%; margin-top:8px;';
        measureBtn.textContent = '🎯 Misura';
        controlsEl.appendChild(measureBtn);
        measureBtn.addEventListener('click', () => {
          const r = levelInstance.measure();
          document.getElementById('ar-feedback').innerHTML = `
            Pos: (${r.position.x}, ${r.position.y}) — Mom: (${r.momentum.x}, ${r.momentum.y})<br>
            Δx=<span style="color:var(--neon-cyan);">${r.deltaX}</span>
            Δp=<span style="color:var(--neon-red);">${r.deltaP}</span> | ${r.total} misure`;
        });
        document.getElementById('ar-feedback').innerHTML = data.ar.description;
      }

      // Start AR
      await engine.start();

      // ── Feedback helpers ──
      function updateLaserFeedback(freq, threshold) {
        const fb = document.getElementById('ar-feedback');
        fb.innerHTML = freq < threshold
          ? `<span style="color:var(--neon-red);">⚠ Sotto soglia (${threshold} THz)</span> — nessun elettrone`
          : `<span style="color:var(--neon-green);">✓ Sopra soglia!</span> — elettroni emessi`;
      }
      function updateSlitFeedback(on) {
        document.getElementById('ar-feedback').innerHTML = on
          ? '<span style="color:var(--neon-red);">Rivelatore ON</span> — niente interferenza'
          : '<span style="color:var(--neon-green);">Rivelatore OFF</span> — frange di interferenza!';
      }
    })();
  </script>
</body>
</html>
